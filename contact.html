<!DOCTYPE html>
<html>
  <head>
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>
  <body>
    <header class="main-nav">
      <div class="logo"><span class="shop">Shop</span><span class="ix">ix</span></div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="cart.html">Cart</a>
        <a href="shipping.html">Orders</a>
        <a href="profile.html">Profile</a>
        <a class="active-link" href="contact.html">Contact</a>
        <a href="offers.html">Offers</a>
        <a href="review.html">Reviews</a>
      </div>
      <div class="toggle">Light</div>
    </header>
    <main class="contact-main">
      <h1>Contact Us</h1>
      <p>If you have any questions or need assistance, please feel free to reach out to us!</p>
      <form class="contact-form">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Your Name ..."/>
        
        <label for="phone">Phone:</label>
        <input type="number" id="phone" name="phone" placeholder="Your Phone ..."/>
        
        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="3" placeholder="Leave Us a Message"></textarea>
        
        <button type="submit" id="contact-submit">Send Message</button>
      </form>
    </main>
    <footer class="main-footer">
      <p>Have Fun Shopping In Our Shop</p>    
    </footer>
    <script src="script.js"></script>
</html>
