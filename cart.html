<!DOCTYPE html>
<html>
  <head>
    <title>Cart</title>
    <link rel="stylesheet" href="style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <header class="main-nav">
      <div class="logo"><span class="shop">Shop</span><span class="ix">ix</span></div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a class="active-link" href="cart.html">Cart</a>
        <a href="shipping.html">Orders</a>
        <a href="profile.html">Profile</a>
        <a href="contact.html">Contact</a>
        <a href="offers.html">Offers</a>
        <a href="review.html">Reviews</a>
      </div>
      <div class="toggle">Light</div>
    </header>
    <main class="cart-main">
      <section class="cart-wrap">
        <h1>Your Cart</h1>
        <div class="cart-list">
          <article class="cart-item">
            <img src="images/clothes/te-shirt/11-19.webp" alt="Oversize T-Shirt" />
            <div class="cart-item-info">
              <h2>Oversize T-Shirt</h2>
              <p>Qty: 1</p>
            </div>
            <span class="cart-price">400 EGP</span>
          </article>

          <article class="cart-item">
            <img src="images/clothes/te-shirt/OIP (1).webp" alt="Black Cotton T-Shirt" />
            <div class="cart-item-info">
              <h2>Black Cotton T-Shirt</h2>
              <p>Qty: 1</p>
            </div>
            <span class="cart-price">450 EGP</span>
          </article>

          <article class="cart-item">
            <img src="images/clothes/te-shirt/America-Needs-Librarians-Graphic-Tee-TShirt-Gift_8e4ea80c-0285-4732-a24a-48c951e14d7a.7b933c9d532dcf96ac52257d8b84a625.avif" alt="Blue T-Shirt" />
            <div class="cart-item-info">
              <h2>Blue T-Shirt</h2>
              <p>Qty: 1</p>
            </div>
            <span class="cart-price">350 EGP</span>
          </article>
        </div>

        <div class="cart-summary">
          <p><strong>Total:</strong> 1200 EGP</p>
          <a href="checkout.html"><button id="checkout-btn">Checkout</button></a>
        </div>
      </section>
    </main>
    <footer class="main-footer">
      <p>Have Fun Shopping In Our Shop</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
