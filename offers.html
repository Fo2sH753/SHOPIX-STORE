<!DOCTYPE html>
<html>
  <head>
    <title>Offers</title>
    <link rel="stylesheet" href="style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <header class="main-nav">
      <div class="logo"><span class="shop">Shop</span><span class="ix">ix</span></div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="cart.html">Cart</a>
        <a href="shipping.html">Orders</a>
        <a href="profile.html">Profile</a>
        <a href="contact.html">Contact</a>
        <a class="active-link" href="offers.html">Offers</a>
        <a href="review.html">Reviews</a>
      </div>
      <div class="toggle">Light</div>
    </header>

    <main class="offers-main">
      <section class="offers-wrap">
        <h1>Clothes On Sale Now</h1>
        <div class="offers-grid">
          <article class="offer-card">
            <img src="images/clothes/te-shirt/11-19.webp" alt="Oversize T-Shirt" />
            <h2>Oversize T-Shirt</h2>
            <p><span class="old-price">400 EGP</span> <span class="new-price">299 EGP</span></p>
          </article>

          <article class="offer-card">
            <img src="images/clothes/jackets/81TM9eXeA5L._AC_SL1500_.jpg" alt="Leather Jacket" />
            <h2>Leather Jacket</h2>
            <p><span class="old-price">1500 EGP</span> <span class="new-price">1199 EGP</span></p>
          </article>

          <article class="offer-card">
            <img src="images/clothes/hoddies/OIP.webp" alt="Comfort Hoodie" />
            <h2>Comfort Hoodie</h2>
            <p><span class="old-price">600 EGP</span> <span class="new-price">449 EGP</span></p>
          </article>
        </div>
      </section>
    </main>

    <footer class="main-footer">
      <p>Have Fun Shopping In Our Shop</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
