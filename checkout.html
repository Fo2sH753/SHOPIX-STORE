<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <title>Checkout</title>
</head>
<body>
  <header class="main-nav">
    <div class="logo"><span class="shop">Shop</span><span class="ix">ix</span></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="cart.html">Cart</a>
      <a href="shipping.html">Orders</a>
      <a href="profile.html">Profile</a>
      <a href="contact.html">Contact</a>
      <a href="offers.html">Offers</a>
      <a href="review.html">Reviews</a>
    </div>
    <div class="toggle">Light</div>
  </header>
  <main class="checkout-main">
    <form action="#" method="post" class="checkout checkout-card">
      <h1 class="checkout-title">Checkout</h1>
      <input type="text" placeholder="Full Name" />
      <input type="tel" placeholder="Phone Number" />
      <input type="text" placeholder="Adress In Detail" />
      <div class="payment">
        <label>Payment Method</label>
        <select>
          <option value="Credit">Credit Card</option>
          <option value="Cash">Cash On Delivery</option>
        </select>
      </div>
      <button type="submit">Confirm Order</button>
    </form>
  </main>
  <footer class="main-footer">
    <p>Have Fun Shopping In Our Shop</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
